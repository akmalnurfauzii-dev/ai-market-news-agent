name: Analisa Pasar & Berita Otomatis
on:
  # Catatan (versi portofolio): cron schedule sengaja dinonaktifkan di repo ini
  # karena repo showcase ini tidak dikonfigurasi dengan Secrets (API keys).
  # Di deployment aslinya, workflow ini jalan otomatis tiap 12 jam lewat:
  #   schedule:
  #     - cron: '0 */12 * * *'
  workflow_dispatch: {}  # trigger manual dari tab Actions kalau ingin tes struktur workflow-nya
permissions:
  contents: write  # perlu ini biar Actions bisa commit history.json & run.log balik ke repo
jobs:
  jalankan-analisa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Jalankan analisa harian
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python app.py
      - name: Simpan history.json & run.log balik ke repo
        if: always()  # tetep commit meski app.py di atas error, biar log-nya kesimpen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json run.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update history & log otomatis [skip ci]"
          git push || echo "Tidak ada perubahan untuk di-push"
